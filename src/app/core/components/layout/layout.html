<main>
  <header>
    <p-menubar [model]="items">
      <ng-template #start>
        <div
          class="flex size-6 shrink-0 items-center justify-center rounded-md bg-linear-to-br from-violet-500 to-indigo-600 text-white text-xs font-bold leading-none"
        >
          A
        </div>
      </ng-template>
      <ng-template #item let-item let-root="root">
        <a pRipple class="flex items-center px-3 py-2 cursor-pointer gap-2" [routerLink]="item.routerLink">
            <svg [pIcon]="item.icon"></svg>
          <span class="text-sm">{{ item.label }}</span>
          @if (item.badge) {
            <p-badge [class]="root ? '' : 'ms-auto'" [value]="item.badge" />
          }
          @if (item.shortcut) {
            <span
              class="ms-auto border border-surface rounded-sm bg-emphasis text-muted-color text-xs p-1"
              >{{ item.shortcut }}</span
            >
          }
          @if (item.items) {
            <i [class]="'ms-auto pi ' + (root ? 'pi-angle-down' : 'pi-angle-right')"></i>
          }
        </a>
      </ng-template>
      <ng-template #end>
        <div class="flex items-center gap-2">
          <!-- <input type="text" pInputText placeholder="Search" class="w-36" /> -->
          <p-avatar
            image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png"
            shape="circle"
          />
        </div>
      </ng-template>
    </p-menubar>
  </header>
